spring:
  application:
    name: eduvoyage
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  threads:
    virtual:
      enabled: true
  codec:
    max-in-memory-size: 16MB

# ---- SpringDoc / OpenAPI ----
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: identity
      paths-to-match: /api/auth/**, /api/users/**, /api/org/**
    - group: course
      paths-to-match: /api/courses/**, /api/chapters/**, /api/nodes/**, /api/coursewares/**
    - group: knowledge-graph
      paths-to-match: /api/graphs/**
    - group: assessment
      paths-to-match: /api/questions/**, /api/homeworks/**, /api/submissions/**
    - group: drive
      paths-to-match: /api/drive/**
    - group: interaction
      paths-to-match: /api/discussions/**, /api/notifications/**, /api/sse/**
    - group: analytics
      paths-to-match: /api/analytics/**

# ---- Actuator / Observability ----
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true
  observations:
    key-values:
      application: eduvoyage

# ---- Application specific (EduVoyage) ----
eduvoyage:
  security:
    jwt:
      # 32+ byte secret; OVERRIDE via env / K8s Secret in prod.
      secret: ${EDUVOYAGE_JWT_SECRET:change-me-in-prod-please-use-a-32byte-min-secret}
      issuer: eduvoyage
      access-token-ttl: 15m
      refresh-token-ttl: 7d
    # public endpoints that bypass JWT authentication
    permit-all:
      - /api/auth/login
      - /api/auth/register
      - /api/auth/refresh
      - /api/auth/captcha
      - /api/auth/password/forgot
      - /api/drive/share/**
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /webjars/**
      - /actuator/health/**
      - /actuator/prometheus
    login:
      max-fail-count: 5
      lock-duration: 15m
    # single = kick previous session on new login; multi = allow concurrent
    concurrent-strategy: ${EDUVOYAGE_CONCURRENT_STRATEGY:multi}
  ratelimit:
    enabled: true
    default-capacity: 100
    default-refill-per-second: 50
  storage:
    minio:
      endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${MINIO_ACCESS_KEY:minioadmin}
      secret-key: ${MINIO_SECRET_KEY:minioadmin}
      bucket: ${MINIO_BUCKET:eduvoyage}
      presign-expiry: 1h
    quota:
      student-bytes: 2147483648   # 2 GiB
      teacher-bytes: 10737418240  # 10 GiB
      admin-bytes: 53687091200    # 50 GiB
  captcha:
    ttl: 5m
    length: 6
