name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      push_images:
        description: Push backend and frontend images to GHCR
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: eduvoyage-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BACKEND_IMAGE: ghcr.io/mrnobody-zst/eduvoyage-backend
  FRONTEND_IMAGE: ghcr.io/mrnobody-zst/eduvoyage-frontend

jobs:
  backend:
    name: Backend build and tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: eduvoyage
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compile
        run: ./gradlew --no-daemon compileJava compileTestJava

      - name: Test
        run: ./gradlew --no-daemon test

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

  manifests:
    name: Compose and Kubernetes manifests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: docker compose config >/tmp/eduvoyage-compose-config.yml

      - name: Render Kubernetes manifests
        run: docker run --rm -v "$PWD":/work -w /work bitnami/kubectl:latest kustomize deploy/k8s >/tmp/eduvoyage-kustomize.yaml

  images:
    name: Docker image build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend, frontend, manifests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.push_images == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./eduvoyage
          push: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.push_images == 'true' }}
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.push_images == 'true' }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
