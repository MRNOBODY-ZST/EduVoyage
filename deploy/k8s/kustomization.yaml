apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: eduvoyage

resources:
  - namespace.yaml
  - secret.yaml
  - configmap.yaml
  - mysql.yaml
  - redis.yaml
  - mongodb.yaml
  - minio.yaml
  - elasticsearch.yaml
  - mysql-init-job.yaml
  - backend.yaml
  - frontend.yaml
  - ingress.yaml
  - hpa.yaml

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: eduvoyage-db-init
    files:
      - schema.sql=db/schema.sql
      - data.sql=db/data.sql
