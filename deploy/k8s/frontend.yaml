apiVersion: v1
kind: Service
metadata:
  name: eduvoyage-frontend
spec:
  selector:
    app: eduvoyage-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eduvoyage-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: eduvoyage-frontend
  template:
    metadata:
      labels:
        app: eduvoyage-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/mrnobody-zst/eduvoyage-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
