apiVersion: v1
kind: Secret
metadata:
  name: eduvoyage-secret
type: Opaque
stringData:
  # Replace every value before production use.
  mysql-database: eduvoyage
  mysql-user: eduvoyage
  mysql-password: eduvoyage
  mysql-root-password: verysecret
  mongodb-root-username: root
  mongodb-root-password: secret
  mongodb-uri: mongodb://root:secret@mongodb:27017/eduvoyage?authSource=admin
  redis-password: eduvoyage-redis
  jwt-secret: replace-with-at-least-32-random-bytes-before-production
  minio-access-key: minioadmin
  minio-secret-key: minioadmin
