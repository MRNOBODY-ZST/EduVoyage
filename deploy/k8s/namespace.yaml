apiVersion: v1
kind: Namespace
metadata:
  name: eduvoyage
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: eduvoyage-quota
  namespace: eduvoyage
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "8"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: eduvoyage-defaults
  namespace: eduvoyage
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 256Mi
      default:
        cpu: 500m
        memory: 512Mi
