name: eduvoyage

services:
  mysql:
    image: mysql:9.0
    environment:
      MYSQL_DATABASE: eduvoyage
      MYSQL_USER: eduvoyage
      MYSQL_PASSWORD: eduvoyage
      MYSQL_ROOT_PASSWORD: verysecret
    command: ["--character-set-server=utf8mb4", "--collation-server=utf8mb4_0900_ai_ci"]
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -ueduvoyage -peduvoyage --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  mongodb:
    image: mongo:7.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: eduvoyage
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ ping: 1 }).ok' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/eduvoyage || true
      "
    restart: "no"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.3
    profiles:
      - search
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow\\&timeout=5s >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 20

  backend:
    build:
      context: ./eduvoyage
    image: eduvoyage/backend:local
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: dev
      R2DBC_URL: r2dbc:mysql://mysql:3306/eduvoyage?useServerPrepareStatement=true
      R2DBC_USERNAME: eduvoyage
      R2DBC_PASSWORD: eduvoyage
      MONGODB_URI: mongodb://root:secret@mongodb:27017/eduvoyage?authSource=admin
      SPRING_MONGODB_URI: mongodb://root:secret@mongodb:27017/eduvoyage?authSource=admin
      SPRING_DATA_MONGODB_URI: mongodb://root:secret@mongodb:27017/eduvoyage?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      ELASTICSEARCH_URIS: http://elasticsearch:9200
      ELASTICSEARCH_USERNAME: ""
      ELASTICSEARCH_PASSWORD: ""
      SPRING_DATA_ELASTICSEARCH_REPOSITORIES_ENABLED: "false"
      MANAGEMENT_HEALTH_ELASTICSEARCH_ENABLED: "false"
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: eduvoyage
      EDUVOYAGE_JWT_SECRET: local-dev-jwt-secret-change-before-production-32bytes
    ports:
      - "8080:8080"
    networks:
      default:
        aliases:
          - eduvoyage-backend

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    image: eduvoyage/frontend:local
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  mysql-data:
  redis-data:
  mongo-data:
  minio-data:
  es-data:
